<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f0e6" />
    <title>英文复习卡片</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">English Writing Review</p>
          <h1>英文复习卡片</h1>
        </div>
        <p id="dataSummary" class="data-summary">载入中...</p>
      </header>

      <nav class="mode-tabs" aria-label="复习模式">
        <button type="button" class="mode-tab is-active" data-mode="study">对照</button>
        <button type="button" class="mode-tab" data-mode="test">测试</button>
        <button type="button" class="mode-tab" data-mode="wrong">错题</button>
        <button type="button" class="mode-tab" data-mode="starred">收藏</button>
      </nav>

      <main class="main-area">
        <section class="control-band" aria-label="筛选">
          <label class="control-field">
            <span>范围</span>
            <select id="filterSelect"></select>
          </label>
          <label id="testTypeField" class="control-field">
            <span>题型</span>
            <select id="testTypeSelect">
              <option value="mixed">混合</option>
              <option value="combine">组合句</option>
              <option value="judge">正误判断</option>
              <option value="quizJudge">雨课堂判断</option>
              <option value="quizChoice">雨课堂四选一</option>
            </select>
          </label>
          <button id="starButton" class="icon-button" type="button" title="收藏当前卡片" aria-label="收藏当前卡片">☆</button>
        </section>

        <section class="progress-line" aria-live="polite">
          <span id="positionText">0 / 0</span>
          <span id="resultText">准备中</span>
        </section>

        <section id="cardHost" class="card-host" aria-live="polite"></section>
      </main>

      <nav class="bottom-actions" aria-label="卡片导航">
        <button id="prevButton" type="button" title="上一题">←<span>上一题</span></button>
        <button id="randomButton" type="button" title="随机">↻<span>随机</span></button>
        <button id="nextButton" type="button" title="下一题">→<span>下一题</span></button>
      </nav>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
